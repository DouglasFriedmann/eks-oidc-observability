name: CI

on:
  push:
    branches:
      - main
      - hardening
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest ruff httpx

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        run: |
          pytest
