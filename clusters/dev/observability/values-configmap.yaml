apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-prometheus-stack-values
  namespace: observability
data:
  values.yaml: |
    grafana:
  enabled: true
  adminPassword: "admin"  # change later (or load from secret)
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

prometheus:
  prometheusSpec:
    retention: 12h
    storageSpec: {}

alertmanager:
  enabled: false

