apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: aws-for-fluent-bit
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: aws-for-fluent-bit
      version: "0.1.34"
      sourceRef:
        kind: HelmRepository
        name: aws-eks-charts
        namespace: flux-system
      interval: 1h
  values:
    serviceAccount:
      create: false
      name: fluent-bit

    cloudWatchLogs:
      enabled: true
      region: us-east-1
      logGroupName: /aws/eks/eks-oidc-observability-dev/application
      logStreamPrefix: fluent-bit-
      autoCreateGroup: true

    firehose:
      enabled: false

    kinesis:
      enabled: false

    elasticsearch:
      enabled: false

    httpServer: true
    readFromHead: false
